site_name: Griddy Documentation
site_description: Unified documentation for the Griddy platform — Python SDK, fbcm CLI, and Griddy Archive Manager.
site_author: John Griebel
site_url: https://docs.thistlegrow.software/
repo_url: https://github.com/Thistle-Grow-Software/griddy-docs

copyright: >
  Copyright &copy; 2026 The authors

theme:
  name: material
  custom_dir: overrides
  language: en
  features:
    - announce.dismiss
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.footnote.tooltips
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.path
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight

  palette:
    - scheme: default
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-night
        name: Switch to light mode

plugins:
  - search
  - multirepo:
      cleanup: true
      repos:
        - section: griddy-sdk-python
          import_url: 'https://github.com/Thistle-Grow-Software/griddy-sdk-python?branch=master&docs_dir=docs/*'
        - section: fbcm
          import_url: 'https://github.com/Thistle-Grow-Software/fbcm?branch=master&docs_dir=docs/*'
        - section: griddy-archive-manager
          import_url: 'https://github.com/Thistle-Grow-Software/griddy-archive-manager?branch=main&docs_dir=docs/*'
        - section: griddy-web-portal
          import_url: 'https://github.com/Thistle-Grow-Software/griddy-web-portal?branch=main&docs_dir=docs/*'

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Thistle-Grow-Software
